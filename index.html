<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Hand Tracked Particles</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at center, #1a0b2e 0%, #000000 100%);
      font-family: 'Segoe UI', sans-serif;
      color: white;
      user-select: none;
    }

    #ui-container {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 10;
    }

    button {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 11px;
      font-weight: 600;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    button:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.5);
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(255, 255, 255, 0.1);
    }

    #status {
      position: absolute;
      top: 25px;
      left: 25px;
      font-size: 13px;
      letter-spacing: 1px;
      color: #00ffcc;
      z-index: 10;
      text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
    }

    #webcam {
      display: none;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>

<body>

  <div id="status">Initializing Neural Engine...</div>

  <div id="ui-container">
    <button onclick="setShape('galaxy')">Galaxy</button>
    <button onclick="setShape('saturn')">Saturn</button>
    <button onclick="setShape('heart')">Heart</button>
    <button onclick="setShape('firework')">Firework</button>
  </div>

  <video id="webcam" autoplay playsinline></video>
  <canvas id="output_canvas"></canvas>

  <script>
    // --- 1. THREE.JS PREMIUM SETUP ---
    const canvas = document.getElementById('output_canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000000, 0.003); // Adds depth

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
    camera.position.z = 180;

    // Visual Hand Cursor (so you know where your hand is!)
    const cursorGeo = new THREE.SphereGeometry(3, 32, 32);
    const cursorMat = new THREE.MeshBasicMaterial({
      color: 0x00ffcc,
      transparent: true,
      opacity: 0.4,
      blending: THREE.AdditiveBlending
    });
    const handCursor = new THREE.Mesh(cursorGeo, cursorMat);
    scene.add(handCursor);

    // --- 2. GENERATE SOFT PARTICLE TEXTURE ---
    function createGlowingTexture() {
      const size = 64;
      const texCanvas = document.createElement('canvas');
      texCanvas.width = size; texCanvas.height = size;
      const ctx = texCanvas.getContext('2d');
      const center = size / 2;
      const gradient = ctx.createRadialGradient(center, center, 0, center, center, center);
      gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
      gradient.addColorStop(0.2, 'rgba(255, 255, 255, 0.8)');
      gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, size, size);
      return new THREE.CanvasTexture(texCanvas);
    }

    // --- 3. PARTICLE SYSTEM ---
    const PARTICLE_COUNT = 20000; // Increased for denser shapes
    const geometry = new THREE.BufferGeometry();

    const positions = new Float32Array(PARTICLE_COUNT * 3);
    const targetPositions = new Float32Array(PARTICLE_COUNT * 3);
    const colors = new Float32Array(PARTICLE_COUNT * 3);
    const velocities = new Float32Array(PARTICLE_COUNT * 3);
    const randoms = new Float32Array(PARTICLE_COUNT); // For organic noise

    const colorPalette = [
      new THREE.Color(0xff0055), // Neon Pink
      new THREE.Color(0x00d4ff), // Neon Blue
      new THREE.Color(0x7000ff), // Deep Purple
      new THREE.Color(0xffd700)  // Gold
    ];

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      positions[i * 3] = (Math.random() - 0.5) * 400;
      positions[i * 3 + 1] = (Math.random() - 0.5) * 400;
      positions[i * 3 + 2] = (Math.random() - 0.5) * 400;

      const color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
      colors[i * 3] = color.r;
      colors[i * 3 + 1] = color.g;
      colors[i * 3 + 2] = color.b;

      randoms[i] = Math.random() * Math.PI * 2; // Random phase for breathing effect
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({
      size: 1.5,
      vertexColors: true,
      blending: THREE.AdditiveBlending,
      transparent: true,
      opacity: 0.9,
      depthWrite: false,
      map: createGlowingTexture() // Apply soft texture
    });

    const particleSystem = new THREE.Points(geometry, material);
    scene.add(particleSystem);

    // --- 4. ADVANCED SHAPE MATH ---
    let currentShape = 'galaxy';
    let isBursting = false;

    function setShape(shape) {
      currentShape = shape;
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        let tx, ty, tz;

        if (shape === 'galaxy') {
          // Spiral Galaxy Math
          const arms = 4;
          const armOffsetMax = 0.5;
          const rotationFactor = 5;
          const randomOffset = Math.random();

          const angle = Math.random() * Math.PI * 2;
          const radius = Math.pow(Math.random(), 1.5) * 60; // Denser in center
          const armOffset = Math.random() * armOffsetMax - armOffsetMax / 2;

          const spinAngle = angle + (radius * rotationFactor) * 0.01;
          tx = Math.cos(spinAngle) * radius + (Math.random() - 0.5) * 3;
          ty = (Math.random() - 0.5) * (10 - radius / 6); // Flatter at edges
          tz = Math.sin(spinAngle) * radius + (Math.random() - 0.5) * 3;
        }
        else if (shape === 'heart') {
          const t = i * 0.05;
          const scale = 3.5;
          tx = scale * 16 * Math.pow(Math.sin(t), 3);
          ty = scale * (13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
          tz = (Math.random() - 0.5) * 15; // Deeper 3D volume
        }
        else if (shape === 'saturn') {
          if (i < PARTICLE_COUNT * 0.3) {
            // Dense Planet body
            const phi = Math.acos(-1 + (2 * i) / (PARTICLE_COUNT * 0.3));
            const theta = Math.sqrt((PARTICLE_COUNT * 0.3) * Math.PI) * phi;
            const radius = 18;
            tx = radius * Math.cos(theta) * Math.sin(phi);
            ty = radius * Math.sin(theta) * Math.sin(phi);
            tz = radius * Math.cos(phi);
          } else {
            // Sharp Rings
            const angle = Math.random() * Math.PI * 2;
            const band = Math.random() > 0.5 ? 28 : 38; // Two distinct rings
            const radius = band + Math.random() * 8;
            tx = radius * Math.cos(angle);
            ty = (Math.random() - 0.5) * 1.5;
            tz = radius * Math.sin(angle);
          }
        }
        else if (shape === 'firework') {
          const u = Math.random();
          const v = Math.random();
          const theta = u * 2.0 * Math.PI;
          const phi = Math.acos(2.0 * v - 1.0);
          const r = Math.pow(Math.random(), 0.3) * 60;
          tx = r * Math.sin(phi) * Math.cos(theta);
          ty = r * Math.sin(phi) * Math.sin(theta);
          tz = r * Math.cos(phi);
        }

        targetPositions[i * 3] = tx;
        targetPositions[i * 3 + 1] = ty;
        targetPositions[i * 3 + 2] = tz;
      }
    }
    setShape('galaxy');

    // --- 5. SMOOTH MEDIAPIPE TRACKING ---
    const videoElement = document.getElementById('webcam');
    let handPos = new THREE.Vector3(999, 999, 0);
    let targetHandPos = new THREE.Vector3(999, 999, 0); // For smoothing
    let pinchCooldown = 0;

    const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.7, // Increased for better stability
      minTrackingConfidence: 0.7
    });

    hands.onResults((results) => {
      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        document.getElementById('status').innerText = "⚡ TRACKING ACTIVE | Pinch to explode";

        const index = results.multiHandLandmarks[0][8];
        const thumb = results.multiHandLandmarks[0][4];

        // Smoother mapping
        const viewWidth = 200;
        const viewHeight = 150;

        targetHandPos.x = -(index.x - 0.5) * viewWidth;
        targetHandPos.y = -(index.y - 0.5) * viewHeight;
        targetHandPos.z = 10;

        const dist = Math.hypot(index.x - thumb.x, index.y - thumb.y);
        if (dist < 0.04 && pinchCooldown <= 0) {
          triggerBurst(handPos);
          pinchCooldown = 40;
        }
      } else {
        document.getElementById('status').innerText = "Waiting for hand detection...";
        targetHandPos.set(999, 999, 0);
      }
      if (pinchCooldown > 0) pinchCooldown--;
    });

    const camUtils = new Camera(videoElement, {
      onFrame: async () => await hands.send({ image: videoElement }),
      width: 640, height: 480
    });
    camUtils.start();

    function triggerBurst(center) {
      isBursting = true;
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const idx = i * 3;
        const dx = positions[idx] - center.x;
        const dy = positions[idx + 1] - center.y;
        const dz = positions[idx + 2] - center.z;
        const distance = Math.sqrt(dx * dx + dy * dy + dz * dz);

        if (distance < 60) {
          const force = (60 - distance) * 0.15;
          velocities[idx] = (dx / distance) * force;
          velocities[idx + 1] = (dy / distance) * force;
          velocities[idx + 2] = (dz / distance) * force;
        }
      }
      setTimeout(() => { isBursting = false; }, 1000);

      const shapes = ['galaxy', 'saturn', 'heart', 'firework'];
      setShape(shapes[(shapes.indexOf(currentShape) + 1) % shapes.length]);
    }

    // --- 6. ANIMATION & ORGANIC PHYSICS ---
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const time = clock.getElapsedTime();

      // Smoothly interpolate hand cursor
      handPos.lerp(targetHandPos, 0.2);
      handCursor.position.copy(handPos);
      // Pulse the hand cursor
      handCursor.scale.setScalar(1 + Math.sin(time * 5) * 0.2);

      const posAttribute = particleSystem.geometry.attributes.position;
      const posArray = posAttribute.array;

      // Global Scene Rotation
      particleSystem.rotation.y += 0.001;
      particleSystem.rotation.z = Math.sin(time * 0.5) * 0.05;

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const idx = i * 3;

        let px = posArray[idx];
        let py = posArray[idx + 1];
        let pz = posArray[idx + 2];

        const tx = targetPositions[idx];
        const ty = targetPositions[idx + 1];
        const tz = targetPositions[idx + 2];

        // Hand Repulsion
        const dx = px - handPos.x;
        const dy = py - handPos.y;
        const dz = pz - handPos.z;
        const distToHand = Math.sqrt(dx * dx + dy * dy + dz * dz);

        if (distToHand < 35 && !isBursting) {
          const force = (35 - distToHand) * 0.15;
          px += (dx / distToHand) * force;
          py += (dy / distToHand) * force;
          pz += (dz / distToHand) * force;
        }

        if (isBursting && (Math.abs(velocities[idx]) > 0.1)) {
          px += velocities[idx];
          py += velocities[idx + 1];
          pz += velocities[idx + 2];

          velocities[idx] *= 0.88;
          velocities[idx + 1] *= 0.88;
          velocities[idx + 2] *= 0.88;
        }
        else {
          // Organic breathing (sine wave displacement)
          const noiseX = Math.sin(time * 2 + randoms[i]) * 0.3;
          const noiseY = Math.cos(time * 1.5 + randoms[i]) * 0.3;

          const lerpSpeed = 0.04;
          px += (tx + noiseX - px) * lerpSpeed;
          py += (ty + noiseY - py) * lerpSpeed;
          pz += (tz - pz) * lerpSpeed;
        }

        posArray[idx] = px;
        posArray[idx + 1] = py;
        posArray[idx + 2] = pz;
      }

      posAttribute.needsUpdate = true;
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>

</html>
